name: "\U0001F41E Bug Report"
description: >-
  ⚠️  LOG FILE REQUIRED — issues submitted without logs are closed without
  response. No exceptions.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        # ⚠️ Read before submitting

        **A log file is not optional.** Every bug report requires one.
        Without it there is nothing to investigate and the issue will be closed automatically.

        **How to get your log — takes 10 seconds:**
        1. Open VR CyberDeck
        2. Go to **Other Settings → // Log Upload**
        3. Click **Upload to Renty.co** → paste the **full rentry URL** below
           (a bare shortcode is not enough — needs the whole `https://rentry.co/…` link)
           
        ---

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: dropdown
    id: download-variant
    attributes:
      label: Download / Install Type
      description: >
        Select the filename you downloaded from the GitHub releases page.
        Check your Downloads folder or browser history if you're not sure.
        **Windows users:** you can also check Programs & Features (installed) or just look at the .exe you ran.
      options:
        - "[Windows] Installer 64-bit — vr-cyberdeck-x.x.x-setup-x64.exe  ← most common"
        - "[Windows] Installer 32-bit — vr-cyberdeck-x.x.x-setup-ia32.exe"
        - "[Windows] Portable 64-bit — vr-cyberdeck-x.x.x-portable-x64.exe"
        - "[Windows] Portable 32-bit — vr-cyberdeck-x.x.x-portable-ia32.exe"
        - "[macOS] Intel — vr-cyberdeck-x.x.x-x64.dmg"
        - "[macOS] Apple Silicon — vr-cyberdeck-x.x.x-arm64.dmg"
        - "[Linux] AppImage 64-bit — vr-cyberdeck-x.x.x-x64.AppImage"
        - "[Linux] AppImage ARM — vr-cyberdeck-x.x.x-arm64.AppImage"
        - "[Linux] .deb 64-bit — vr-cyberdeck-x.x.x-x64.deb"
        - "[Linux] .deb ARM — vr-cyberdeck-x.x.x-arm64.deb"
        - "Not sure / not listed"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App Version
      placeholder: "e.g. 1.2.1  (shown in Main UI (top middle of app, bottom left), Other Settings (top of app))"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug. "It doesn't work" is not a description. 
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Click …
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "\U0001F4CB Log Upload — REQUIRED"
      description: >
        **Paste the full rentry URL** (e.g. `https://rentry.co/abc123`)
        from Other Settings → // Log Upload → Upload to rentry.co.

        A bare shortcode (e.g. `abc123`) is not enough — paste the whole URL.
        "N/A", "no errors", or raw logs will be treated as missing
        and the issue will be closed.
      placeholder: |
        Paste:
          • https://rentry.co/your-slug-here       ← full URL from Upload Log
    validations:
      required: true

  - type: checkboxes
    id: log-confirmed
    attributes:
      label: Confirmation
      options:
        - label: >-
            I have pasted my log in the form of a rentry link above.
            I understand that issues without real logs are closed without response.
          required: true
