name: Issue Log Enforcer

on:
  issues:
    types: [opened, reopened, edited]
  issue_comment:
    types: [created]
  schedule:
    # Daily at 12:00 UTC — scans for stale needs-logs issues to close
    - cron: '0 12 * * *'

permissions:
  issues: write

jobs:
  # ─── Check log presence on bug reports ───────────────────────────────────
  check-logs:
    name: Require log file
    if: >
      github.event_name == 'issues' &&
      (github.event.action == 'opened' ||
       github.event.action == 'reopened' ||
       github.event.action == 'edited')
    runs-on: ubuntu-latest
    steps:
      - name: Ensure needs-logs label exists
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'needs-logs'
              })
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'needs-logs',
                color: 'd93f0b',
                description: 'Issue is missing required log file — will be auto-closed'
              })
            }

      - name: Check issue body for logs
        uses: actions/github-script@v7
        with:
          script: |
            const issue  = context.payload.issue
            const body   = issue.body ?? ''
            const labels = issue.labels.map(l => l.name)

            // Only enforce on bug reports
            if (!labels.includes('bug')) return

            // Accept ONLY:
            //   1. A full rentry URL (https://rentry.co/<slug> or rentry.co/<slug>)
            //   2. Raw main.log content (bracketed timestamps from electron-log)
            // A bare shortcode like "abc123" is not enough.
            const hasRentryUrl   = /\b(?:https?:\/\/)?rentry\.(?:co|org)\/[a-z0-9_-]+/i.test(body)
            const hasRawLogLines = /\[\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d{3}\]\s*\[(info|error|warn|debug)\]/i.test(body)

            const needsLogs = !(hasRentryUrl || hasRawLogLines)

            if (!needsLogs) {
              // Looks good — remove the label if it was previously set
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name: 'needs-logs'
                })
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: [
                    '✅ **Log file detected** — thank you for including it.',
                    'The `needs-logs` flag has been removed. This issue is now in the queue.'
                  ].join('\n')
                })
              } catch { /* label wasn't there — nothing to do */ }
              return
            }

            // Already labeled — don't spam comments on every edit
            if (labels.includes('needs-logs') && github.event.action === 'edited') return

            // Label it and drop the comment
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['needs-logs']
            })

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: [
                '## ⚠️ Log File Missing — Issue Flagged',
                '',
                'This bug report does not include a valid log reference.',
                '**Without logs this issue cannot be investigated and will be closed in 7 days.**',
                '',
                '### What counts as a valid log',
                '',
                '- A **full rentry URL** like `https://rentry.co/your-slug` (not just the slug)',
                '- Or the **raw `main.log` contents** with bracketed timestamps',
                '',
                '### How to attach yours (takes 10 seconds)',
                '',
                '1. Open **VR CyberDeck**',
                '2. Go to **Settings → Logs**',
                '3. Click **Upload Log** — copy the **full** `https://rentry.co/…` link',
                '4. **Edit this issue** and paste it in the log field',
                '',
                '> The `needs-logs` label will be removed automatically once a valid log is detected.',
                '',
                '---',
                '*Automated message. Do not reply asking for an exception — there are none.*'
              ].join('\n')
            })

  # ─── Auto-close stale needs-logs issues ──────────────────────────────────
  auto-close:
    name: Auto-close missing-log issues
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Close stale needs-logs issues
        uses: actions/github-script@v7
        with:
          script: |
            const sevenDaysAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000)

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'needs-logs',
              state: 'open',
              per_page: 100
            })

            for (const issue of issues) {
              if (new Date(issue.updated_at) > sevenDaysAgo) continue

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: [
                  '## 🔒 Closed — Log File Never Provided',
                  '',
                  'This issue has been open for 7 days with no log file attached.',
                  'It is being closed automatically.',
                  '',
                  'If the bug is still present, **open a new issue** and include your log this time.',
                  'Issues without logs will always be closed — no exceptions.',
                  '',
                  '**How to get your log:** VR CyberDeck → Settings → Logs → Upload Log',
                  '',
                  '---',
                  '*Closed by the VR CyberDeck issue bot.*'
                ].join('\n')
              })

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'not_planned'
              })
            }

  # ─── Game list / server-issue triage ─────────────────────────────────────
  server-issue-triage:
    name: Ask Rookie check on game-list issues
    if: >
      github.event_name == 'issues' &&
      (github.event.action == 'opened' || github.event.action == 'reopened')
    runs-on: ubuntu-latest
    steps:
      - name: Ensure triage labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'server-issue-check', color: 'fbca04', description: 'Waiting for Rookie check — may be a server outage' },
              { name: 'server-issue',       color: 'e4e669', description: 'Confirmed server-side issue — not a CyberDeck bug'  }
            ]
            for (const l of labels) {
              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: l.name })
              } catch {
                await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, ...l })
              }
            }

      - name: Detect keywords and ask about Rookie
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue
            const text  = ((issue.title ?? '') + ' ' + (issue.body ?? '')).toLowerCase()
            const existing = issue.labels.map(l => l.name)

            // Skip if we already asked or already confirmed
            if (existing.includes('server-issue-check') || existing.includes('server-issue')) return

            const keywords = [
              'refresh gamelist',   'refresh game list',
              'no gamelist',        'no game list',
              'gamelist empty',     'game list empty',
              'empty gamelist',     'empty game list',
              'gamelist not',       'game list not',
              'games not loading',  'games not showing',
              'games not refresh',  'refresh games',
              'games missing',      'missing games',
              "can't see games",    'cant see games',
              'no games showing',   'games disappeared',
              'game list won',      'gamelist won',
              'games won',          'not loading games',
            ]

            if (!keywords.some(kw => text.includes(kw))) return

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['server-issue-check']
            })

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: [
                '## 🔍 Quick Check Before We Investigate',
                '',
                'This looks like it could be a server-side sync issue rather than a CyberDeck bug.',
                '',
                '**Is [Rookie (VRP Rookie sideloader)](https://github.com/VRPirates/rookie) working for you?** Can it load the game list?',
                '',
                '- Reply **`/rookie yes`** → Rookie works fine, issue stays open for investigation',
                '- Reply **`/rookie no`** → Rookie is also broken, this is a server outage and the issue will be closed',
                '',
                '*Only your reply counts — others will be ignored.*'
              ].join('\n')
            })

  # ─── Handle /rookie yes|no responses ─────────────────────────────────────
  handle-rookie-response:
    name: Handle Rookie check response
    if: github.event_name == 'issue_comment' && github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    steps:
      - name: Process response
        uses: actions/github-script@v7
        with:
          script: |
            const comment = context.payload.comment
            const issue   = context.payload.issue
            const body    = (comment.body ?? '').toLowerCase().trim()

            // Only count the original reporter's reply
            if (comment.user.login !== issue.user.login) return

            // Only act on issues tagged for this check
            const labels = issue.labels.map(l => l.name)
            if (!labels.includes('server-issue-check')) return

            const rookieNo  = /\/rookie\s+no\b/.test(body)  ||
                              (/\brookie\b/.test(body) && /(not working|broken|also broken|same issue|doesn'?t work|also not|failing)/.test(body))
            const rookieYes = /\/rookie\s+yes\b/.test(body) ||
                              (/\brookie\b/.test(body) && /(works|working|fine|ok\b|loads|loaded)/.test(body))

            if (!rookieNo && !rookieYes) return

            // Remove the pending-check label either way
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                name: 'server-issue-check'
              })
            } catch { /* already removed */ }

            if (rookieNo) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['server-issue']
              })
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: [
                  '## 🔒 Closing — Server Outage',
                  '',
                  'Since Rookie is also unable to load the game list, this is a server-side outage outside of CyberDeck\'s control.',
                  'There\'s nothing to fix on our end — the VRP servers need to come back up.',
                  '',
                  'Keep an eye on the VRP community channels for status updates.',
                  'Once the servers recover, CyberDeck will work again without any update needed.',
                  '',
                  '---',
                  '*Closed automatically by the issue bot.*'
                ].join('\n')
              })
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'not_planned'
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: [
                  '✅ **Rookie is working** — this looks like a CyberDeck-specific bug.',
                  'The issue is staying open for investigation. Thanks for confirming!'
                ].join('\n')
              })
            }
